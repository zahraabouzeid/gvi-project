name: Release

permissions:
  contents: read
  pages: write
  id-token: write

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (z.B. 1.2.0)'
        required: true
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Run tests and build JaCoCo report
        run: mvn --batch-mode --no-transfer-progress verify
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/site/jacoco
      - name: Package JaCoCo report
        run: tar -a -cf jacoco-report.zip -C target/site jacoco
      - name: Upload JaCoCo artifact
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: jacoco-report.zip
          if-no-files-found: error

  build:
    runs-on: windows-latest
    needs: test
    if: >
      needs.test.result == 'success' && (
      github.event_name == 'workflow_dispatch' ||
      github.ref_type == 'tag' ||
      contains(github.event.head_commit.message, '[ci deploy]'))
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Build single-file EXE
        run: .\build-exe.ps1 -SkipTests
        shell: powershell
      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: exe
          path: dist/*.exe
          if-no-files-found: error
      - name: Upload app ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-zip
          path: dist/*.zip
          if-no-files-found: error

  pages:
    runs-on: ubuntu-latest
    needs: test
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy JaCoCo report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy:
    runs-on: ubuntu-latest
    needs: [build, pages]
    if: needs.build.result == 'success' && needs.pages.result == 'success'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
            echo "value=$VERSION" >> $GITHUB_OUTPUT
          else
            VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
            echo "value=$VERSION" >> $GITHUB_OUTPUT
          fi
      - name: Prepare release assets directory
        run: mkdir -p release-assets
      - name: Download EXE artifact
        uses: actions/download-artifact@v4
        with:
          name: exe
          path: release-assets/exe
      - name: Download app ZIP artifact
        uses: actions/download-artifact@v4
        with:
          name: app-zip
          path: release-assets/app-zip
      - name: Download JaCoCo artifact
        uses: actions/download-artifact@v4
        with:
          name: jacoco-report
          path: release-assets/jacoco
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: Release v${{ steps.version.outputs.value }}
          append_body: true
          body: |
            JaCoCo report: ${{ needs.pages.outputs.page_url }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-assets/exe/*.exe
            release-assets/app-zip/*.zip
            release-assets/jacoco/jacoco-report.zip
