name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (z.B. 1.2.0)'
        required: true
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[ci deploy]')
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Run tests
        run: mvn --batch-mode --no-transfer-progress test

  build:
    runs-on: windows-latest
    needs: test
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Build single-file EXE
        run: .\build-exe.ps1 -SkipTests
        shell: powershell
      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: exe
          path: dist/*.exe
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
            echo "value=$VERSION" >> $GITHUB_OUTPUT
          fi
      - name: Download EXE artifact
        uses: actions/download-artifact@v4
        with:
          name: exe
          path: dist
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: Release v${{ steps.version.outputs.value }}
          generate_release_notes: true
          files: dist/*.exe
